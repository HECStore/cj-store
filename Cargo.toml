[package]
name = "cj-store"
version = "1.0.0"
edition = "2024"
publish = false

[dependencies]
anyhow = "1.0.103"
# Pinned to the `1.21.11` branch tip (`41a9ae6a`, 2026-03-22 â€” the last commit
# before the 26.1 protocol bump in `eeaf1435`). This avoids the `Protocol26_1`
# rewriter chain in ViaBackwards that injects malformed `custom_data` markers
# during 1.21.9 â†’ 1.21.11 â†’ 26.1 translation, which surfaced as
# "Invalid root type 1" decode failures on `container_set_content` for the
# diamond chest. See the bot/chest_io.rs `PACKET_DECODE_PREFIX` doc and the
# ViaFabric#477 / azalea#262 / azalea#261 thread for the upstream history.
#
# Why git pin and not crates.io: the published `0.15.1+mc1.21.11` (Feb 2026)
# has exact pre-release pins (`signature = "=3.0.0-rc.8"`,
# `crypto-primes = "=0.7.0-pre.7"`) whose transitive resolution against
# current rsa/pkcs8/der pre-releases no longer compiles â€” the 1.21.11-branch
# tip in git has refreshed those deps but never got a new crates.io release.
#
# Why path-deps `azalea-viaversion` instead of git: the upstream
# `azalea-viaversion` Cargo.toml has `azalea = { git = "..." }` with no
# branch/rev, which cargo resolves to a *separate* git source from our
# `branch = "1.21.11"` pin and ends up compiling two azalea instances side
# by side. The plugin then captures 26.1's ECS event types
# (`ReceiveCustomQueryEvent`, `StartJoinServerEvent`, `Swarm`, â€¦) and
# silently never fires on the 1.21.11 client's actually-emitted events â€”
# breaks Mojang auth at runtime even though the build succeeds. The
# vendored copy under `vendor/azalea-viaversion/` is byte-identical to
# upstream (commit `c0d1e41f`, 2026-04-08, ViaProxy 3.4.10) except its
# `Cargo.toml` adds the same `branch = "1.21.11"` to its azalea dep so
# cargo unifies the two specs into a single git source.
#
# When upstream ships ViaProxy 3.4.11 (or whichever release bundles
# ViaBackwards â‰Ą5.9.0 with the post-26.1 `custom_data` hashing fixes),
# both pins can be dropped to track `main` again for the 26.1 protocol
# features.
azalea = { git = "https://github.com/azalea-rs/azalea", rev = "41a9ae6aaff77646c08c64ac1334a8cc6081c24f" }
azalea-viaversion = { path = "vendor/azalea-viaversion" }
chrono = { version = "0.4.45", features = ["serde"] }
dialoguer = "0.12.0"
# Explicit direct dep so the chat module can call `memchr::memmem::Finder`
# at the source level. `regex` already pulls this in transitively (see
# `Cargo.lock` â€” `memchr 2.8.0`), so declaring it here only fixes the API
# surface; no extra crate is compiled. The chat `contains_bytes` /
# `contains_bytes_ci` helpers and the `search_history` byte-level CI scan
# need a real O(n+m) substring algorithm; the previous `windows().any()`
# implementation is O(n*m) and shows up under the trust-ladder hot path.
memchr = "2.8.2"
dotenvy = "0.15.7"
getrandom = "0.4.3"
reqwest = { version = "0.13.4", default-features = false, features = [
    "json",
    "rustls",
] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = [
    "rt-multi-thread",
    "macros",
    "sync",
    "time",
    # `signal` enables `tokio::signal::ctrl_c()` so shutdown handling can
    # live in the async runtime instead of spinning up a dedicated `ctrlc`
    # OS-signal thread. Call-site migration tracked separately.
    "signal",
] }
tokio-util = "0.7.18"
notify = "8.2.0"
parking_lot = "0.12.5"
tracing = "0.1.44"
tracing-appender = "0.2.5"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

[dev-dependencies]
proptest = "1.11.0"
tempfile = "3.27.0"

[profile.dev]
opt-level = 1
[profile.dev.package."*"]
opt-level = 3

# Long-running daemon (24/7 bot) â€” pay one-time release-build cost for
# tighter inlining on the AMM/pricing/journal-serialization hot paths.
# Conservative: thin LTO only; codegen-units left at default to keep
# release wall time reasonable.
[profile.release]
lto = "thin"

# NOTE: `simdnbt` / `simdnbt-derive` pinning.
#
# Upstream `azalea` (rev 41a9ae6a, see comment block above) depends on
# `simdnbt = { git = "https://github.com/azalea-rs/simdnbt" }` with no
# `rev = "..."` pin. Cargo will resolve that to the current branch tip
# at lockfile-generation time, so a fresh `cargo update` (or a clean
# checkout from a teammate without --locked) could silently pick up a
# different simdnbt commit than what we tested against. simdnbt parses
# wire NBT for every container, chest, and inventory packet the bot
# handles, so a regression there is a top-class fault.
#
# A `[patch.<git-url>]` entry pointing at the same upstream URL is
# rejected by cargo (`patches must point to different sources`), and
# a `[patch.crates-io]` entry would not match a transitive *git* dep.
# That leaves three options:
#
#   1. Fork `azalea` and add an explicit `rev = "4cc67bcd..."` to its
#      simdnbt dep, then point our `azalea` rev pin at the fork.
#   2. Fork `simdnbt` to a different URL and `[patch.<azalea-url>]` it.
#   3. Trust the lockfile (`Cargo.lock` currently records simdnbt at
#      `4cc67bcd980c752b412beee0ea1192f502333bf0`) and rely on
#      `cargo {build,check,test} --locked` everywhere â€” which CI does.
#
# Current state: option 3. The CI workflow uses `--locked` on every
# cargo invocation, and `cargo-deny`'s `sources` check allowlists
# azalea-rs's git sources only. Tracked as FOLLOWUPS for a stronger
# pin via option 1 if upstream simdnbt commit drift becomes a problem.

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
todo = "warn"
unimplemented = "warn"
dbg_macro = "warn"
print_stderr = "warn"
print_stdout = "warn"
