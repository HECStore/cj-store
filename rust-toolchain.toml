[toolchain]
# This project uses Azalea, which may require nightly depending on its
# transitive dependencies (SIMD crates / feature gates). Nightly is
# additionally enabled by `-Zshare-generics=y` on the Linux and macOS
# stanzas of `.cargo/config.toml` (the Windows MSVC stanza leaves it
# commented out), which is a nightly-only flag.
#
# The channel is pinned to a specific dated nightly so CI, contributors,
# and the maintainer all build against the same toolchain. Bump the date
# deliberately when upstream needs a newer nightly — do not let it drift.
channel = "nightly-2026-04-21"
profile = "default"
